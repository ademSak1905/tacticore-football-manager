<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>İlk 11 & Taktik | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-admin-repair">
  </head>
  <body data-shell-page="lineup">
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menü</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div>
      <button id="logoutButton" class="btn secondary">Çıkış</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar">
        <nav class="nav"></nav>
      </aside>
      <main class="content">
        <section class="lineup-studio">
          <section class="page-title lineup-title">
            <div>
              <h1>İlk 11 & Taktik</h1>
              <p class="muted">Sahadaki oyuncuları, yedek kulübesi ve maç planı aynı ekranda.</p>
            </div>
            <div class="actions lineup-title-actions">
              <select id="formationSelect"></select>
              <button id="saveLineup" class="btn" type="button">İlk 11'i Kaydet</button>
            </div>
          </section>

          <form id="tacticForm" class="lineup-tactic-form">
            <section class="lineup-main-grid">
              <div class="pitch lineup-pitch" id="lineupPitch"></div>

              <aside class="lineup-side">
                <section class="card lineup-side-card bench-card">
                  <h2>Yedek Kulübesi</h2>
                  <p class="muted">Oyuncuyu sahadaki kartın üstüne sürükle.</p>
                  <div id="bench" class="bench-list"></div>
                </section>

                <section class="card lineup-side-card">
                  <h2>Takım Gücü</h2>
                  <div id="lineupPower" class="mini-stats lineup-power-grid"></div>
                  <p id="lineupMessage" class="message"></p>
                </section>

                <section class="card lineup-side-card tactic-instructions-card">
                  <h2>TAKTİKSEL TALİMATLAR</h2>
                  <div class="instruction-grid">
                    <label class="field icon-field"><span>Oyun Stili</span><select id="mentality"><option value="defensive">Defansif</option><option value="balanced">Dengeli</option><option value="attacking">Ofansif</option></select></label>
                    <label class="field icon-field"><span>Pres Yoğunluğu</span><select id="tempo_label"></select></label>
                    <label class="field icon-field"><span>Ofansif Tarz</span><select id="attack_style"></select></label>
                    <label class="field icon-field"><span>Defans Çizgisi</span><select id="defense_style"></select></label>
                    <label class="field icon-field"><span>Topla Oyun</span><select id="passing_style"><option value="short">Kısa Pas</option><option value="mixed">Karışık Pas</option><option value="direct">Direkt Oyun</option></select></label>
                    <label class="field icon-field"><span>Diziliş</span><select id="formation"></select></label>
                  </div>
                  <div class="tactic-setting-strip">
                    <button class="tactic-setting-tile" data-setting="setPieces" data-options="Standart,Korner Odaklı,Serbest Vuruş" type="button"><strong>?</strong><span>Duran Toplar</span><small>Standart</small></button>
                    <button class="tactic-setting-tile" data-setting="marking" data-options="Alan,Adam Adama,Karma" type="button"><strong>?</strong><span>Markaj</span><small>Alan</small></button>
                    <button class="tactic-setting-tile" data-setting="offsideTrap" data-options="Kapalı,Açık,Agresif" type="button"><strong>?</strong><span>Ofsayt Tuzağı</span><small>Kapalı</small></button>
                  </div>
                </section>
              </aside>
            </section>

            <section class="card tactic-bottom-panel">
              <div class="tactic-preset-box">
                <h2>TAKTİK</h2>
                <label class="field"><span>Hazır Taktik</span><select><option>Özel Taktik</option><option>Dengeli Baskı</option><option>Hızlı Hücum</option></select></label>
                <div class="icon-actions" aria-label="Taktik kısa işlemleri">
                  <button class="btn icon-only secondary" type="button">?</button>
                  <button class="btn icon-only secondary" type="button">?</button>
                  <button class="btn icon-only danger" type="button">?</button>
                </div>
              </div>

              <div class="tactic-slider-grid">
                <label class="field range-field"><span>Mentalite <em>Dengeli</em><strong id="pressingValue">55</strong></span><input id="pressing" type="range" min="0" max="100"></label>
                <label class="field range-field"><span>Genişlik <strong id="widthValue">60</strong></span><input id="width" type="range" min="0" max="100"></label>
                <label class="field range-field"><span>Saldırı <strong id="aggressionValue">50</strong></span><input id="aggression" type="range" min="0" max="100"></label>
                <label class="field range-field"><span>Savunma <strong id="defensiveLineValue">50</strong></span><input id="defensive_line" type="range" min="0" max="100"></label>
              </div>

              <aside class="tactic-summary-box">
                <input id="tempo" type="hidden" value="55">
                <div id="tacticMetrics" class="grid stats tactic-metrics"></div>
                <div id="tacticHints" class="tactic-hints"></div>
                <button class="btn" type="submit">Taktiği Kaydet</button>
                <p id="message" class="message"></p>
              </aside>
            </section>
            <section class="card tactic-bottom-panel booster-inventory-card">
              <div class="tactic-preset-box">
                <h2>ENVANTER</h2>
                <p class="muted">Marketten aldigin guclendiricileri oyunculara uygula.</p>
              </div>
              <div class="tactic-slider-grid">
                <label class="field"><span>Boost</span><select id="boosterSelect"></select></label>
                <label class="field"><span>Oyuncu</span><select id="boosterPlayer"></select></label>
              </div>
              <aside class="tactic-summary-box">
                <div id="boosterInventory" class="mini-stats"></div>
                <button id="useBooster" class="btn" type="button">Boostu Kullan</button>
                <p id="boosterMessage" class="message"></p>
              </aside>
            </section>
          </form>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260607-admin-repair"></script>
    <script src="/js/lineup.js?v=20260607-compact-fixes"></script>
    <script src="/js/tactics.js?v=20260607-compact-fixes"></script>
  </body>
</html>
