<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menü</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div>
      <button id="logoutButton" class="btn secondary">Çıkış</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav">
        <a data-page="dashboard" href="/dashboard.html">Dashboard</a><a data-page="squad" href="/squad.html">Kadro</a><a data-page="lineup" href="/lineup.html">İlk 11</a><a data-page="tactics" href="/tactics.html">Taktik</a><a data-page="calendar" href="/calendar.html">Takvim</a><a data-page="league" href="/league.html">Lig</a><a data-page="transfers" href="/transfers.html">Transfer</a><a data-page="training" href="/training.html">Antrenman</a><a data-page="economy" href="/economy.html">Ekonomi</a>
      </nav></aside>
      <main class="content">
        <section class="page-title"><div><h1>Yönetim paneli</h1><p class="muted">Kulübünün bugünkü durumu.</p></div></section>
        <section class="dashboard-tabs">
          <button class="btn secondary active" data-dashboard-tab="general">Genel</button>
          <button class="btn secondary" data-dashboard-tab="league">Lig</button>
          <button class="btn secondary" data-dashboard-tab="europe">Avrupa</button>
          <button class="btn secondary" data-dashboard-tab="calendar">Takvim</button>
        </section>
        <section id="dashboardGeneralPanel" class="dashboard-panel">
          <section id="europeWeekCard" class="europe-week-card" hidden></section>
          <section id="dashboardStats" class="grid stats"></section>
          <section class="grid two-col" style="margin-top:16px">
            <div id="dashboardPitch" class="card pitch dashboard-pitch"></div>
            <div class="card">
              <h2>Sıradaki maç</h2>
              <div id="nextMatchCard" class="next-match-card"></div>
              <div class="actions" style="margin-top:16px">
                <select id="currencySelect"><option value="EUR" selected>Euro</option><option value="USD">Dolar</option><option value="TRY">TL</option></select>
                <button id="nextWeek" class="btn secondary">Haftayı İlerle</button>
                <a id="goMatch" class="btn green" href="/match.html">Maça Geç</a>
              </div>
              <p id="gameState" class="message"></p>
              <h2 style="margin-top:18px">Hızlı menü</h2>
              <div class="quick-menu modern-menu">
                <a class="btn secondary" href="/squad.html">Kadrom</a><a class="btn secondary" href="/lineup.html">İlk 11</a><a class="btn secondary" href="/tactics.html">Taktikler</a><a class="btn secondary" href="/calendar.html">Takvim</a><a class="btn secondary" href="/europe.html">Avrupa Merkezi</a><a class="btn secondary" href="/transfers.html">Transfer Pazarı</a><a class="btn secondary" href="/training.html">Antrenman</a><a class="btn secondary" href="/league.html">Lig Tablosu</a><a class="btn secondary" href="/economy.html">Ekonomi</a><a class="btn secondary" href="/social.html">Sosyal Medya</a>
              </div>
              <div id="clubSummary" style="margin-top:18px"></div>
            </div>
          </section>
        </section>
        <section id="dashboardLeaguePanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Süper Lig</h2><div id="dashboardLeagueTable" class="table-wrap"></div></div>
        </section>
        <section id="dashboardEuropePanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Avrupa</h2><div id="dashboardEuropeContent"></div></div>
        </section>
        <section id="dashboardCalendarPanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Takvim</h2><div id="dashboardCalendarContent" class="calendar-list"></div></div>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260517-no-match-nav"></script>
    <script src="/js/dashboard.js?v=20260517-dashboard-tabs"></script>
  </body>
</html>
