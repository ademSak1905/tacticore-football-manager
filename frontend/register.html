<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kayıt | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-final-shell">
  </head>
  <body class="auth-page">
    <main class="auth-panel">
      <div class="brand"><span class="brand-mark">TC</span><span>TactiCore</span></div>
      <h1>Kulubunu sec ve basla.</h1>
      <p class="muted">Takimini sec, kariyerini kur ve sezona gir.</p>
      <form id="registerForm" class="form">
        <label class="field"><span>Kullanici adi</span><input id="username" minlength="3" required autocomplete="username"></label>
        <label class="field"><span>E-posta</span><input id="email" type="email" required autocomplete="email"></label>
        <label class="field"><span>Super Lig takimi</span><select id="teamId" required></select></label>
        <label class="field"><span>Takim adi</span><input id="clubName" minlength="3" placeholder="Secilen takim adi kullanilabilir"></label>
        <label class="field"><span>Sifre</span><input id="password" type="password" minlength="6" required autocomplete="new-password"></label>
        <button class="btn green" type="submit">Kayit ol</button>
        <p id="message" class="message"></p>
      </form>
      <p class="muted">Hesabin var mi? <a href="/login.html">Giris yap</a></p>
    </main>
    <script src="/js/auth.js?v=20260607-final-shell"></script>
  </body>
</html>
