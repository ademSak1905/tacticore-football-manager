<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>İlk 11 & Taktik | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260604-mobile-menu-lineup">
  </head>
  <body data-shell-page="lineup">
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menü</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div>
      <button id="logoutButton" class="btn secondary">Çıkış</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar">
        <nav class="nav"></nav>
      </aside>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>İlk 11 & Taktik</h1>
            <p class="muted">Sahadaki oyuncular, yedek kulübesi ve maç planı aynı ekranda.</p>
          </div>
          <div class="actions">
            <select id="formationSelect"></select>
            <button id="saveLineup" class="btn" type="button">İlk 11'i kaydet</button>
          </div>
        </section>

        <section class="grid lineup-layout lineup-tactic-layout">
          <div class="pitch lineup-pitch" id="lineupPitch"></div>
          <aside class="lineup-control-panel">
            <div class="card">
              <h2>Yedek kulübesi</h2>
              <p class="muted">Oyuncuyu sahadaki kartın üstüne sürükle.</p>
              <div id="bench" class="bench-list"></div>
              <h2>Takım gücü</h2>
              <div id="lineupPower" class="mini-stats"></div>
              <p id="lineupMessage" class="message"></p>
            </div>

            <form id="tacticForm" class="card form compact-tactic-panel">
              <h2>Taktik</h2>
              <div class="form-two">
                <label class="field"><span>Diziliş</span><select id="formation"></select></label>
                <label class="field"><span>Tempo</span><select id="tempo_label"></select></label>
                <label class="field"><span>Hücum</span><select id="attack_style"></select></label>
                <label class="field"><span>Savunma</span><select id="defense_style"></select></label>
                <label class="field"><span>Oyun tarzı</span><select id="mentality"><option value="defensive">Defansif</option><option value="balanced">Dengeli</option><option value="attacking">Ofansif</option></select></label>
                <label class="field"><span>Pas</span><select id="passing_style"><option value="short">Kısa pas</option><option value="mixed">Karışık pas</option><option value="direct">Direkt oyun</option></select></label>
              </div>
              <label class="field range-field"><span>Pres <strong id="pressingValue">55</strong></span><input id="pressing" type="range" min="0" max="100"></label>
              <label class="field range-field"><span>Defans çizgisi <strong id="defensiveLineValue">50</strong></span><input id="defensive_line" type="range" min="0" max="100"></label>
              <label class="field range-field"><span>Agresiflik <strong id="aggressionValue">50</strong></span><input id="aggression" type="range" min="0" max="100"></label>
              <label class="field range-field"><span>Genişlik <strong id="widthValue">60</strong></span><input id="width" type="range" min="0" max="100"></label>
              <input id="tempo" type="hidden" value="55">
              <div id="tacticMetrics" class="grid stats tactic-metrics"></div>
              <div id="tacticHints" class="tactic-hints"></div>
              <button class="btn" type="submit">Taktiği kaydet</button>
              <p id="message" class="message"></p>
            </form>
          </aside>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260604-mobile-menu"></script>
    <script src="/js/lineup.js?v=20260604-touch-lineup-v2"></script>
    <script src="/js/tactics.js?v=20260517-lineup-tactic"></script>
  </body>
</html>
