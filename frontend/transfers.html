<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transfer | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-admin-repair">
  </head>
  <body data-shell-page="transfers">
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menu</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div>
      <button id="logoutButton" class="btn secondary">Cikis</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav"></nav></aside>
      <main class="content">
        <section class="page-title transfer-page-title">
          <div>
            <h1>Transfer merkezi</h1>
            <p class="muted">Dinamik pazar, soylentiler, kiraliklar ve pazarliklar.</p>
          </div>
          <strong id="budgetBadge" class="badge">Butce</strong>
        </section>
        <p id="message" class="message"></p>
        <section class="card transfer-toolbar">
          <div class="tabs"><button id="marketTab" class="btn">Pazar</button><button id="sellTab" class="btn secondary">Oyuncularim</button></div>
          <label class="field"><span>Kategori</span><select id="categoryFilter"></select></label>
          <label class="field"><span>Pozisyon</span><select id="positionFilter"><option value="all">Tum Pozisyonlar</option><option value="GK">Kaleci</option><option value="DEF">Defans</option><option value="MID">Orta Saha</option><option value="FWD">Forvet</option></select></label>
          <label class="field"><span>Oyuncu Ara</span><input id="transferSearch" placeholder="Isim yaz..."></label>
          <strong id="windowBadge" class="badge">Donem</strong>
        </section>
        <section id="pendingOffers" class="card pending-offers-card" hidden></section>
        <section id="transferList" class="player-grid transfer-market-list"></section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260607-admin-repair"></script>
    <script src="/js/transfers.js?v=20260605-transfer-dashboard-theme"></script>
  </body>
</html>
