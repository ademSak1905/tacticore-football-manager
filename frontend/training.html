<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Antrenman | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260603-shell-leaderboard">
  </head>
  <body>
    <header class="topbar"><button id="menuButton" class="btn secondary menu-btn">Menü</button><div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div><button id="logoutButton" class="btn secondary">Çıkış</button></header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav"><a data-page="dashboard" href="/dashboard.html">Dashboard</a><a data-page="squad" href="/squad.html">Kadro</a><a data-page="tactics" href="/tactics.html">Taktik</a><a data-page="calendar" href="/calendar.html">Takvim</a><a data-page="league" href="/league.html">Lig</a><a data-page="transfers" href="/transfers.html">Transfer</a><a data-page="training" href="/training.html">Antrenman</a><a data-page="economy" href="/economy.html">Ekonomi</a></nav></aside>
      <main class="content">
        <section class="page-title"><div><h1>Antrenman</h1><p class="muted">Haftalık gelişim programı.</p></div></section>
        <section class="card form">
          <h2>Takım antrenmanı</h2>
          <label class="field"><span>Antrenman türü</span><select id="teamTrainingType"><option value="attack">Hücum organizasyonu</option><option value="defense">Savunma yerleşimi</option><option value="pressing">Pres çalışması</option><option value="passing">Pas oyunu</option><option value="fitness">Kondisyon</option><option value="set_piece">Duran top</option><option value="shooting">Şut çalışması</option><option value="morale">Takım morali</option></select></label>
          <label class="field"><span>Yoğunluk</span><select id="teamIntensity"><option value="light">Hafif</option><option value="normal" selected>Normal</option><option value="heavy">Ağır</option></select></label>
          <button id="runTeamTraining" class="btn green" type="button">Takım antrenmanı yap</button>
        </section>
        <section class="card form" style="margin-top:16px">
          <h2>Bireysel antrenman</h2>
          <label class="field"><span>Oyuncu</span><select id="playerSelect"></select></label>
          <label class="field"><span>Odak</span><select id="playerTrainingType"><option value="pace">Hız</option><option value="finishing">Bitiricilik</option><option value="passing">Pas</option><option value="dribbling">Top sürme</option><option value="defense">Savunma</option><option value="physical">Fizik</option><option value="stamina">Kondisyon</option><option value="goalkeeping">Kalecilik</option></select></label>
          <label class="field"><span>Yoğunluk</span><select id="playerIntensity"><option value="light">Hafif</option><option value="normal" selected>Normal</option><option value="heavy">Ağır</option></select></label>
          <button id="runPlayerTraining" class="btn" type="button">Bireysel antrenman yap</button>
        </section>
        <p id="message" class="message"></p>
        <section class="card table-wrap" style="margin-top:16px"><h2>Sonuçlar</h2><div id="trainingResults"></div></section>
        <section class="card table-wrap" style="margin-top:16px"><h2>Geçmiş</h2><div id="trainingHistory"></div></section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260603-shell-leaderboard"></script>
    <script src="/js/training.js"></script>
  </body>
</html>
