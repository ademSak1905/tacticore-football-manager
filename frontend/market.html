<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Market | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-admin-repair">
  </head>
  <body data-shell-page="market">
    <header class="topbar"><button id="menuButton" class="btn secondary menu-btn">Menü</button><div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div><button id="logoutButton" class="btn secondary">Çıkış</button></header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav"></nav></aside>
      <main class="content">
        <section class="page-title">
          <div><h1>Market</h1><p class="muted">Demo TactiCoins paketleri ve oyun içi güçlendiriciler.</p></div>
          <strong id="marketBalance" class="badge">0 TactiCoins</strong>
        </section>
        <p id="message" class="message"></p>
        <section id="marketItems" class="player-grid"></section>
        <section class="card" style="margin-top:16px">
          <h2>Güçlendirici kullan</h2>
          <div class="form-two">
            <label class="field"><span>Güçlendirici</span><select id="boosterSelect"></select></label>
            <label class="field"><span>Oyuncu</span><select id="boosterPlayer"></select></label>
          </div>
          <button id="useBooster" class="btn green" type="button">Kullan</button>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260607-admin-repair"></script>
    <script src="/js/market.js?v=20260604-market"></script>
  </body>
</html>
