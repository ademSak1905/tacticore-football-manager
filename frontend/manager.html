<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menajerim | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260604-coins-spy-market">
  </head>
  <body>
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menü</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div>
      <button id="logoutButton" class="btn secondary">Çıkış</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav"></nav></aside>
      <main class="content">
        <section class="page-title">
          <div>
            <h1>Menajerim</h1>
            <p class="muted">Kariyer profilin, XP seviyen ve başarımların.</p>
          </div>
        </section>

        <section id="managerHero" class="manager-hero card"></section>

        <section class="grid stats manager-stat-grid" id="managerStats"></section>

        <section class="grid two-col manager-layout">
          <div class="card">
            <h2>Taraftar & Yonetim</h2>
            <div id="careerMood" class="timeline-list"></div>
          </div>
          <div class="card">
            <h2>Kulup Teklifleri</h2>
            <div id="clubOffers" class="timeline-list"></div>
          </div>
        </section>

        <section class="grid two-col manager-layout">
          <div class="card">
            <h2>Sponsorlar</h2>
            <div id="sponsorDeals" class="timeline-list"></div>
          </div>
          <div class="card">
            <h2>Genç Akademi</h2>
            <div id="academyReports" class="timeline-list"></div>
          </div>
        </section>

        <section class="grid two-col manager-layout">
          <div class="card">
            <h2>Başarımlar</h2>
            <div id="achievementList" class="achievement-grid"></div>
          </div>
          <div class="card">
            <h2>Kariyer geçmişi</h2>
            <div id="careerHistory" class="timeline-list"></div>
          </div>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260604-coins-nav"></script>
    <script src="/js/manager.js?v=20260526-manager"></script>
  </body>
</html>
