<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giris | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260608-mobile-topbar">
  </head>
  <body class="auth-page">
    <main class="auth-panel">
      <section class="login-card">
        <div class="brand"><span class="brand-mark">TC</span><span>TactiCore</span></div>
        <h1>Mac gunu yaklasiyor.</h1>
        <p class="muted">Takimini sec, taktigini kur, sosyal medyayi sustur.</p>
        <form id="loginForm" class="form">
          <label class="field"><span>Kullanici adi veya e-posta</span><input id="login" required autocomplete="username"></label>
          <label class="field"><span>Sifre</span><input id="password" type="password" required autocomplete="current-password"></label>
          <button class="btn" type="submit">Giris yap</button>
          <p id="message" class="message"></p>
        </form>
        <p class="muted auth-links">
          Hesabın yok mu? <a href="/register.html">Yeni kulüp kur</a>
          <a href="/admin.html">Admin Girisi</a>
        </p>
      </section>

    </main>
    <script src="/js/auth.js?v=20260607-final-polish"></script>
  </body>
</html>
