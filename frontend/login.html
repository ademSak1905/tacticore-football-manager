<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Giriş | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body class="auth-page">
    <main class="auth-panel">
      <div class="brand"><span class="brand-mark">TC</span><span>TactiCore</span></div>
      <h1>Maç günü yaklaşıyor.</h1>
      <p class="muted">Takımını seç, taktiğini kur, sosyal medyayı sustur.</p>
      <form id="loginForm" class="form">
        <label class="field"><span>Kullanıcı adı veya e-posta</span><input id="login" required autocomplete="username"></label>
        <label class="field"><span>Şifre</span><input id="password" type="password" required autocomplete="current-password"></label>
        <button class="btn" type="submit">Giriş yap</button>
        <p id="message" class="message"></p>
      </form>
      <p class="muted">Hesabın yok mu? <a href="/register.html">Yeni kulüp kur</a></p>
    </main>
    <script src="/js/auth.js?v=20260526-manager"></script>
  </body>
</html>
