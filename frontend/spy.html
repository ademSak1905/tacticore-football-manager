<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Casus | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-admin-repair">
  </head>
  <body data-shell-page="spy">
    <header class="topbar"><button id="menuButton" class="btn secondary menu-btn">Menü</button><div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulüp</span></div><button id="logoutButton" class="btn secondary">Çıkış</button></header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav"></nav></aside>
      <main class="content">
        <section class="page-title">
          <div><h1>Casus Merkezi</h1><p class="muted">Rakip takımlar hakkında riskli ama değerli bilgiler topla.</p></div>
          <strong id="spyBalance" class="badge">0 TactiCoins</strong>
        </section>
        <section class="grid spy-grid">
          <form id="spyForm" class="card form">
            <h2>Casus gönder</h2>
            <label class="field"><span>Rakip takım</span><select id="spyTeam"></select></label>
            <label class="field"><span>Casus tipi</span><select id="spyType"></select></label>
            <button class="btn green" type="submit">Casus Günder</button>
            <p id="message" class="message"></p>
          </form>
          <section class="card">
            <h2>Son rapor</h2>
            <div id="spyLatest" class="spy-report"></div>
          </section>
        </section>
        <section class="card" style="margin-top:16px">
          <h2>Rapor geçmişi</h2>
          <div id="spyReports" class="message-list"></div>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260607-admin-repair"></script>
    <script src="/js/spy.js?v=20260604-spy-tactic-delay"></script>
  </body>
</html>
