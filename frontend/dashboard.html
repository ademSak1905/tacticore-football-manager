<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css?v=20260607-compact-fixes">
  </head>
  <body data-shell-page="dashboard">
    <header class="topbar">
      <button id="menuButton" class="btn secondary menu-btn">Menu</button>
      <div class="brand"><span class="brand-mark">TC</span><span id="userBadge">Kulup</span></div>
      <button id="logoutButton" class="btn secondary">Cikis</button>
    </header>
    <div class="layout">
      <aside id="sidebar" class="sidebar"><nav class="nav">
        <a data-page="dashboard" href="/dashboard.html">Dashboard</a><a data-page="manager" href="/manager.html">Menajerim</a><a data-page="squad" href="/squad.html">Kadro</a><a data-page="lineup" href="/lineup.html">Ilk 11</a><a data-page="tactics" href="/tactics.html">Taktik</a><a data-page="calendar" href="/calendar.html">Takvim</a><a data-page="league" href="/league.html">Lig</a><a data-page="transfers" href="/transfers.html">Transfer</a><a data-page="messages" href="/messages.html">Mesajlar</a><a data-page="spy" href="/spy.html">Casus</a><a data-page="daily-tasks" href="/daily-tasks.html">Gorevler</a><a data-page="market" href="/market.html">Market</a><a data-page="training" href="/training.html">Antrenman</a><a data-page="economy" href="/economy.html">Ekonomi</a>
      </nav></aside>
      <main class="content">
        <section class="page-title"><div><h1>Yonetim paneli</h1><p class="muted">Kulubunun bugunku durumu.</p></div></section>
        <section class="dashboard-tabs">
          <button class="btn secondary active" data-dashboard-tab="general">Genel</button>
          <button class="btn secondary" data-dashboard-tab="league">Lig</button>
          <button class="btn secondary" data-dashboard-tab="europe">Avrupa</button>
          <button class="btn secondary" data-dashboard-tab="calendar">Takvim</button>
        </section>
        <section id="dashboardGeneralPanel" class="dashboard-panel">
          <section id="europeWeekCard" class="europe-week-card" hidden></section>
          <section id="dashboardInboxCard" class="card inbox-dashboard-card" hidden></section>
          <section class="dashboard-head-grid">
            <section id="dashboardStats" class="grid stats"></section>
            <div class="card dashboard-side-panel">
              <h2 id="nextMatchTitle">Siradaki mac</h2>
              <div id="nextMatchCard" class="next-match-card"></div>
              <div class="actions calendar-actions" style="margin-top:16px">
                <select id="currencySelect"><option value="EUR" selected>Euro</option><option value="USD">Dolar</option><option value="TRY">TL</option></select>
                <button id="nextDay" class="btn secondary time-advance">Sonraki Gun</button>
                <button id="next3Days" class="btn secondary time-advance">3 Gun Ilerle</button>
                <button id="goMatchDay" class="btn secondary time-advance">Mac Gunune Git</button>
                <button id="nextWeek" class="btn secondary time-advance">Haftayi Ilerle</button>
                <a id="goMatch" class="btn green" href="/match.html">Maca Cik</a>
              </div>
              <p id="gameState" class="message"></p>
              <section id="dashboardSideNotifications" class="dashboard-side-notifications"></section>
              <div id="clubSummary" style="margin-top:18px"></div>
            </div>
          </section>
          <div id="dashboardPitch" class="card pitch dashboard-pitch"></div>
        </section>
        <section id="dashboardLeaguePanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Super Lig</h2><div id="dashboardLeagueTable" class="table-wrap"></div></div>
        </section>
        <section id="dashboardEuropePanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Avrupa</h2><div id="dashboardEuropeContent"></div></div>
        </section>
        <section id="dashboardCalendarPanel" class="dashboard-panel" hidden>
          <div class="card"><h2>Takvim</h2><div id="dashboardCalendarContent" class="calendar-list"></div></div>
        </section>
      </main>
    </div>
    <script src="/js/auth.js?v=20260607-compact-fixes"></script>
    <script src="/js/dashboard.js?v=20260605-final-topbar-login-dashboard"></script>
  </body>
</html>
