<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kayit | TactiCore</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body class="auth-page">
    <main class="auth-panel">
      <div class="brand"><span class="brand-mark">TC</span><span>TactiCore</span></div>
      <h1>Kulübünü çekirdeğe bağla.</h1>
      <p class="muted">Süper Lig takımını seç ve sezon akışına gir.</p>
      <form id="registerForm" class="form">
        <label class="field"><span>Kullanıcı adı</span><input id="username" minlength="3" required autocomplete="username"></label>
        <label class="field"><span>E-posta</span><input id="email" type="email" required autocomplete="email"></label>
        <label class="field"><span>Süper Lig takımı</span><select id="teamId" required></select></label>
        <label class="field"><span>Takım adı</span><input id="clubName" minlength="3" placeholder="Seçilen takım adı kullanılabilir"></label>
        <label class="field"><span>Şifre</span><input id="password" type="password" minlength="6" required autocomplete="new-password"></label>
        <button class="btn green" type="submit">Kayit ol</button>
        <p id="message" class="message"></p>
      </form>
      <p class="muted">Hesabın var mı? <a href="/login.html">Giriş yap</a></p>
    </main>
    <script src="/js/auth.js?v=20260525-one-team-career"></script>
  </body>
</html>
